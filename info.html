  <style>
    body {

    /* gradient-bg sits BELOW Three.js canvas (z-index:2) */
    .gradient-bg {

    /* Floating minimal label */
    .info-label {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      text-align: center;
      pointer-events: none;
    }
    .info-label__eyebrow {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,136,0,0.7);
      margin-bottom: 4px;
    }
    .info-label__title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.1rem,3vw,1.6rem);
      font-weight: 800;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
    /* Hide the card and related blocks */
    .info-card {
      background: rgba(12, 10, 22, 0.55);
      border: 1px solid rgba(220, 20, 60, 0.22);
      border-radius: 20px;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      padding: 48px 56px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 24px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(220,20,60,0.08);
      animation: cardIn 1s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    .info-card__eyebrow {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent, #dc143c);
      margin-bottom: 16px;
      opacity: 0.9;
    }

    .info-card__title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 800;
      color: #f5f5f7;
      line-height: 1.1;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }

    .info-card__title span {
      color: var(--accent, #dc143c);
    }

    .info-card__sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      margin: 0 0 32px;
    }

    /* Animated progress bar */
    .info-card__progress-wrap {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .info-card__progress-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #dc143c, #9b30ff);
      border-radius: 99px;
      animation: shimmer 2.4s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      from { width: 30%; opacity: 0.7; }
      to   { width: 55%; opacity: 1;   }
    }

    /* Back link */
    .info-card__back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.25s ease;
    }

    .info-card__back:hover { color: var(--accent, #dc143c); }

    .info-card__back svg {
      transition: transform 0.25s ease;
    }

    .info-card__back:hover svg {
      transform: translateX(-3px);
    }

    /* Grain noise overlay */
    .info-noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

  <script>
    function updateLivedTime() {
      const birthDate = new Date("2004-07-04T09:00:00+07:00");
      const now = new Date();

      let years = now.getFullYear() - birthDate.getFullYear();
      let months = now.getMonth() - birthDate.getMonth();
      let days = now.getDate() - birthDate.getDate();
      let hours = now.getHours() - birthDate.getHours();
      let minutes = now.getMinutes() - birthDate.getMinutes();
      let seconds = now.getSeconds() - birthDate.getSeconds();

      if (seconds < 0) {
          seconds += 60;
          minutes--;
      }
      if (minutes < 0) {
          minutes += 60;
          hours--;
      }
      if (hours < 0) {
          hours += 24;
          days--;
      }
      if (days < 0) {
          const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
          days += prevMonth.getDate();
          months--;
      }
      if (months < 0) {
          months += 12;
          years--;
      }

      const display = document.getElementById("time-lived-display");
      if (display) {
          display.innerHTML = `NguyenDevs &middot; lived for ${years} years, ${months} months, ${days} days, ${hours} hours, ${minutes} minutes and ${seconds} seconds.`;
      }
    }
    setInterval(updateLivedTime, 1000);
    updateLivedTime();
  </script>
