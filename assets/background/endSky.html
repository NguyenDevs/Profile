<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>End Sky</title>
<style>
body { margin: 0; overflow: hidden; background: #000; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');

const vs = `
attribute vec2 aPos;
void main() {
    gl_Position = vec4(aPos, 0.0, 1.0);
}
`;

const fs = `
precision highp float;
uniform float uTime;
uniform vec2 uResolution;
uniform mat3 uRot;

#define TAU 6.28318530718

float Lift(float x, float amount) {
    return (1.0 + amount) * x / (amount * x + 1.0);
}

mat2 Rotate(float angle) {
    float s = sin(angle), c = cos(angle);
    return mat2(c, -s, s, c);
}

vec3 GetEndSkyColor(vec3 viewDir) {
    vec2 coord = viewDir.xz / (1.0 + abs(viewDir.y)) * 80.0;
    vec3 pattern = vec3(0.0);
    float amplitude = 1.0;
    float frequency = 1.0;
    for (int i = 0; i < 16; i++) {
        vec2 direction = vec2(0.707106782) * Rotate(float(i) * 4.3333);
        float k = TAU / (20.0 / frequency);
        float a = amplitude / k;
        vec2 dir = direction;
        float f = k * (dot(dir, coord.xy) - Lift(k, 1.6) * uTime * 0.31321);
        vec3 layer;
        layer.xz = dir.xy * (a * cos(f)) / a;
        layer.y = sin(f);
        pattern += layer.y * 0.5 + 0.5;
        coord -= layer.xz * 0.36;
        amplitude *= 0.99;
        frequency *= 1.2;
    }
    pattern = clamp(pattern * 0.05, 0.0, 1.0);
    pattern = pattern * pattern * exp((pow(max(1.3 * pattern - 0.3, 0.0), vec3(2.0)) - 1.0) * (1.0 - vec3(0.7686, 0.6275, 1.0) * 0.5) * 13.0) * 60.0;
    return pattern;
}

vec3 LinearTosRGB(vec3 x) {
    vec3 sRGBLo = x * 12.92;
    vec3 sRGBHi = pow(abs(x), vec3(1.0 / 2.4)) * 1.055 - 0.055;
    return mix(sRGBHi, sRGBLo, step(x, vec3(0.0031308)));
}

vec3 TechTonemap(vec3 color) {
    vec3 a = color * min(vec3(1.0), 1.0 - exp(-1.0 / 0.038 * color));
    a = mix(a, color, color * color);
    return a / (a + 0.6);
}

void main() {
    vec2 uv = gl_FragCoord.xy / uResolution * 2.0 - 1.0;
    uv.x *= uResolution.x / uResolution.y;
    vec3 viewDir = normalize(uRot * vec3(uv, 1.0));
    vec3 color = GetEndSkyColor(viewDir);
    color = TechTonemap(color * 1.2);
    color = LinearTosRGB(color);
    gl_FragColor = vec4(color, 1.0);
}
`;

function createShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'uTime');
const uResolution = gl.getUniformLocation(prog, 'uResolution');
const uRot = gl.getUniformLocation(prog, 'uRot');

let fx = 0, fy = 0, fz = 1;
let rx = 1, ry = 0, rz = 0;
let ux = 0, uy = 1, uz = 0;
let dragging = false;
let lastX = 0, lastY = 0;

function normalize(v) {
    const len = Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]);
    return [v[0]/len, v[1]/len, v[2]/len];
}

function cross(a, b) {
    return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
}

canvas.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => { dragging = false; });
window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dyaw = -(e.clientX - lastX) * 0.005;
    const dpitch = (e.clientY - lastY) * 0.005;

    const c1 = Math.cos(dyaw), s1 = Math.sin(dyaw);
    let nx = rx * c1 + rz * s1;
    let nz = -rx * s1 + rz * c1;
    rx = nx; rz = nz;
    nx = fx * c1 + fz * s1;
    nz = -fx * s1 + fz * c1;
    fx = nx; fz = nz;
    nx = ux * c1 + uz * s1;
    nz = -ux * s1 + uz * c1;
    ux = nx; uz = nz;

    const c2 = Math.cos(dpitch), s2 = Math.sin(dpitch);
    const fxf = fx, fyf = fy, fzf = fz;
    const uxf = ux, uyf = uy, uzf = uz;
    fx = fxf * c2 + uxf * s2;
    fy = fyf * c2 + uyf * s2;
    fz = fzf * c2 + uzf * s2;
    ux = uxf * c2 - fxf * s2;
    uy = uyf * c2 - fyf * s2;
    uz = uzf * c2 - fzf * s2;

    const f = normalize([fx, fy, fz]);
    const r = normalize(cross(normalize([ux, uy, uz]), f));
    const u = cross(f, r);

    fx = f[0]; fy = f[1]; fz = f[2];
    rx = r[0]; ry = r[1]; rz = r[2];
    ux = u[0]; uy = u[1]; uz = u[2];

    lastX = e.clientX;
    lastY = e.clientY;
});

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

function render() {
    const time = performance.now() * 0.001;
    gl.uniform1f(uTime, time);
    gl.uniform2f(uResolution, canvas.width, canvas.height);

    gl.uniformMatrix3fv(uRot, false, new Float32Array([
        rx, ry, rz,
        ux, uy, uz,
        fx, fy, fz
    ]));

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
